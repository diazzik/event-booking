{% extends 'base.html' %}

{% block title %}
Редактирование категории
{% endblock %}

{% block content %}

<div class="container py-4">
    <div class="card">
        <div class="card-header">
            <h2>Редактирование категории</h2>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label">Название категории</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ category.name }}" required>
                </div>
                <div class="mb-3">
                    <label for="code" class="form-label">Код категории</label>
                    <input type="text" class="form-control" id="code" name="code" value="{{ category.code }}" required>
                    <small class="text-muted">Например: concert, theatre, festival</small>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'admin_categories' %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
