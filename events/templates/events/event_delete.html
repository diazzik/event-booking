{% extends 'base.html' %}

{% block title %}
Удаление
{% endblock %}

{% block content %}

<div class="alert alert-danger">

<h2>
Удаление мероприятия
</h2>

<p>
Вы действительно хотите удалить:
<strong>{{ event.title }}</strong> ?
</p>

<form method="POST">

    {% csrf_token %}

    <button class="btn btn-danger">

        Удалить

    </button>

    <a href="{% url 'event_detail' event.id %}"
       class="btn btn-secondary">

        Отмена

    </a>

</form>

</div>

{% endblock %}
