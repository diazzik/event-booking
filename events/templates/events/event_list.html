{% extends 'base.html' %}

{% block title %}
Мероприятия
{% endblock %}

{% block content %}

<h1 class="mb-4">Все мероприятия</h1>

<div class="row">

{% for event in events %}

<div class="col-md-4 mb-4">

    <div class="card event-card">

        {% if event.image %}
        <img src="{{ event.image.url }}"
             class="card-img-top">
        {% endif %}

        <div class="card-body">

            <h5>{{ event.title }}</h5>

            <p>{{ event.location }}</p>

            <p>{{ event.event_date }}</p>

            <p>{{ event.price }} ₽</p>

            <a href="{% url 'event_detail' event.id %}"
               class="btn btn-primary">

                Подробнее

            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
